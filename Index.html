<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    padding: 10px;
  }

  .wrap {
    width: 100%;
    max-width: 360px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 12px;
  }

  th {
    font-weight: 400;
    font-size: 10px;
    color: #888;
    padding-bottom: 6px;
  }

  td {
    text-align: center;
    padding: 6px 0;
    height: 28px;
    color: #ddd;
  }

  td.empty {
    color: transparent;
  }

  td.today {
    background: #1b3a22;
    color: #fff;
    border-radius: 6px;
    font-weight: 500;
  }

  /* remove qualquer sensação de borda */
  table, td, th {
    border: none !important;
  }

  /* limita altura total do calendário */
  .calendar-box {
    max-height: 220px;
    overflow: hidden;
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="calendar-box">
    <table>
      <thead>
        <tr>
          <th>D</th><th>S</th><th>T</th><th>Q</th><th>Q</th><th>S</th><th>S</th>
        </tr>
      </thead>
      <tbody id="cal"></tbody>
    </table>
  </div>

</div>

<script>
const now = new Date();
const d = now.getDate();
const m = now.getMonth();
const y = now.getFullYear();

function build() {
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();

  let html = "";
  let day = 1;

  for (let i = 0; i < 6; i++) {
    html += "<tr>";

    for (let j = 0; j < 7; j++) {

      if (i === 0 && j < first) {
        html += `<td class="empty">0</td>`;
      } 
      else if (day > days) {
        html += `<td class="empty">0</td>`;
      } 
      else {
        const isToday = day === d ? "today" : "";
        html += `<td class="${isToday}">${day}</td>`;
        day++;
      }
    }

    html += "</tr>";
  }

  document.getElementById("cal").innerHTML = html;
}

build();
</script>

</body>
</html>
