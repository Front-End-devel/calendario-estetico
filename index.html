<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #191919;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
  }

  .wrap {
    width: 200px;
    height: 110px;
    overflow: hidden;
  }

  table {
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 9px;
    color: #d6d6d6;
  }

  th {
    font-weight: 400;
    font-size: 8px;
    color: #8a8a8a;
    padding: 2px 0;
  }

  td {
    text-align: center;
    padding: 2px 0;
    height: 14px;
    color: #cfcfcf;
  }

  td.empty {
    color: transparent;
  }

  td.today {
    background: #1b3a22;
    color: #ffffff;
    border-radius: 4px;
    font-weight: 500;
  }

  table, td, th {
    border: none !important;
  }
</style>
</head>

<body>

<div class="wrap">
  <table>
    <thead>
      <tr>
        <th>D</th><th>S</th><th>T</th><th>Q</th><th>Q</th><th>S</th><th>S</th>
      </tr>
    </thead>
    <tbody id="cal"></tbody>
  </table>
</div>

<script>
const now = new Date();
const d = now.getDate();
const m = now.getMonth();
const y = now.getFullYear();

function build() {
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();

  let html = "";
  let day = 1;

  for (let i = 0; i < 6; i++) {
    html += "<tr>";

    for (let j = 0; j < 7; j++) {

      if (i === 0 && j < first) {
        html += `<td class="empty">0</td>`;
      } 
      else if (day > days) {
        html += `<td class="empty">0</td>`;
      } 
      else {
        const isToday = day === d ? "today" : "";
        html += `<td class="${isToday}">${day}</td>`;
        day++;
      }
    }

    html += "</tr>";
  }

  document.getElementById("cal").innerHTML = html;
}

build();
</script>

</body>
</html>
